<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vura AI | Intelligent Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        vura: {
                            bg: '#0B0B0C',
                            sidebar: '#121214',
                            accent: '#6366f1', // Electric Indigo
                            text: '#F1F1F1'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .markdown-body p { margin-bottom: 1rem; line-height: 1.7; }
        .markdown-body code { background: #262626; padding: 0.2rem 0.4rem; border-radius: 4px; font-size: 0.85em; color: #818cf8; }
        .markdown-body pre { background: #000; padding: 1.25rem; border-radius: 12px; margin: 1rem 0; border: 1px solid #333; overflow-x: auto; }
        .vura-gradient { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
    </style>
</head>
<body class="bg-vura-bg text-vura-text h-screen overflow-hidden flex font-sans antialiased">

    <aside id="sidebar" class="bg-vura-sidebar w-72 h-full flex flex-col border-r border-white/5 z-30 transition-all duration-300">
        <div class="p-6">
            <div class="flex items-center gap-3 mb-8">
                <div class="w-8 h-8 vura-gradient rounded-lg flex items-center justify-center font-bold text-white shadow-lg shadow-indigo-500/20">V</div>
                <span class="text-xl font-bold tracking-tight">Vura AI</span>
            </div>
            <button id="new-chat-btn" class="w-full py-3 px-4 rounded-xl border border-white/10 hover:bg-white/5 transition-all flex items-center justify-center gap-2 text-sm font-medium">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2" stroke-linecap="round"/></svg>
                New Session
            </button>
        </div>
        
        <div id="chat-history" class="flex-1 overflow-y-auto px-4 space-y-2 text-sm text-gray-400">
            </div>

        <div class="p-4 border-t border-white/5">
            <button id="settings-btn" class="flex items-center gap-3 w-full p-3 hover:bg-white/5 rounded-xl transition-colors text-sm">
                <svg class="w-5 h-5 opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" stroke-width="2"/></svg>
                System Config
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative">
        <div id="chat-container" class="flex-1 overflow-y-auto pt-20 pb-40 px-6 md:px-24">
            <div id="empty-state" class="h-full flex flex-col items-center justify-center text-center max-w-2xl mx-auto">
                <h1 class="text-4xl md:text-5xl font-bold mb-4 bg-clip-text text-transparent bg-gradient-to-b from-white to-gray-500">
                    What will we build, <br>Vura?
                </h1>
                <p class="text-gray-400 text-lg">Your high-performance gateway to synthetic intelligence.</p>
            </div>
        </div>

        <div class="absolute bottom-0 left-0 w-full p-6 md:px-24 pb-10 bg-gradient-to-t from-vura-bg via-vura-bg to-transparent">
            <div class="max-w-4xl mx-auto relative group">
                <textarea id="message-input" rows="1" class="w-full bg-[#1A1A1C] border border-white/10 rounded-2xl py-5 pl-6 pr-16 outline-none focus:border-vura-accent transition-all resize-none shadow-2xl" placeholder="Message Vura..."></textarea>
                <button id="send-btn" class="absolute right-3 bottom-3 p-3 vura-gradient rounded-xl text-white shadow-lg hover:scale-105 active:scale-95 transition-transform disabled:opacity-30">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
            </div>
        </div>
    </main>

    </body>
</html>
